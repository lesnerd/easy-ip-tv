name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -only-testing:EasyIpTvTests \
            -skip-testing:EasyIpTvTests/ContentLoadingTests \
            -skip-testing:EasyIpTvTests/M3UIntegrationTests \
            -parallel-testing-enabled YES \
            -enableCodeCoverage NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  build-release:
    name: Build Release
    needs: unit-tests
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - platform: macOS
            destination: "platform=macOS"
            artifact_name: EasyIpTv-macOS
          - platform: iOS
            destination: "generic/platform=iOS Simulator"
            artifact_name: EasyIpTv-iOS
          - platform: tvOS
            destination: "generic/platform=tvOS Simulator"
            artifact_name: EasyIpTv-tvOS
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      # Code Signing Setup
      # Required secrets:
      # - CERTIFICATE_BASE64: Base64-encoded Apple Distribution certificate (.p12)
      #   Generate with: base64 -i Certificates.p12 | pbcopy
      # - CERTIFICATE_PASSWORD: Password for the certificate
      # - PROVISIONING_PROFILE_IOS_BASE64: Base64-encoded iOS provisioning profile
      # - PROVISIONING_PROFILE_MACOS_BASE64: Base64-encoded macOS provisioning profile
      # - PROVISIONING_PROFILE_TVOS_BASE64: Base64-encoded tvOS provisioning profile
      #   Generate with: base64 -i profile.mobileprovision | pbcopy

      - name: Create temporary keychain
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Save keychain info for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Import signing certificate
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set keychain as default
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_IOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_IOS_BASE64 }}
          PROVISIONING_PROFILE_MACOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_MACOS_BASE64 }}
          PROVISIONING_PROFILE_TVOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_TVOS_BASE64 }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          # Select the appropriate provisioning profile based on platform
          case "$PLATFORM" in
            iOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_IOS_BASE64"
              ;;
            macOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_MACOS_BASE64"
              ;;
            tvOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_TVOS_BASE64"
              ;;
          esac

          # Install provisioning profile if available
          if [ -n "$PROFILE_BASE64" ]; then
            PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision

            # Decode and install provisioning profile
            echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

            # Extract UUID and copy to proper location
            PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
            cp "$PROFILE_PATH" "$PP_DIR/$PP_UUID.mobileprovision"
          fi

      - name: Build ${{ matrix.platform }}
        run: |
          # Build with code signing if certificates are available, otherwise skip signing
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            xcodebuild build \
              -project EasyIpTv.xcodeproj \
              -scheme EasyIpTv \
              -destination "${{ matrix.destination }}" \
              -configuration Release \
              -derivedDataPath build
          else
            xcodebuild build \
              -project EasyIpTv.xcodeproj \
              -scheme EasyIpTv \
              -destination "${{ matrix.destination }}" \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO
          fi

      - name: Package ${{ matrix.platform }} artifact
        run: |
          cd build/Build/Products
          RELEASE_DIR=$(ls -d Release* | head -1)
          if [ -d "$RELEASE_DIR/EasyIpTv.app" ]; then
            cd "$RELEASE_DIR"
            zip -r "${{ matrix.artifact_name }}.zip" EasyIpTv.app
            mv "${{ matrix.artifact_name }}.zip" "$GITHUB_WORKSPACE/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.zip"
          if-no-files-found: ignore

      - name: Clean up keychain
        if: ${{ always() && env.KEYCHAIN_PATH != '' }}
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG..$TAG")
          else
            NOTES=$(git log --pretty=format:"- %s" -20)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Easy IPTV ${{ steps.notes.outputs.tag }}
          body: |
            ## What's Changed
            ${{ steps.notes.outputs.notes }}

            ## Platforms
            - macOS 14+
            - iOS / iPadOS 17+
            - tvOS 17+
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          files: artifacts/*
