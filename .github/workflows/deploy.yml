name: Deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to deploy'
        required: true
        type: choice
        options:
          - all
          - iOS
          - macOS
          - tvOS
        default: 'all'
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      platforms: ${{ steps.env.outputs.platforms }}
    steps:
      - name: Determine environment and platforms
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger - use inputs
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT

            if [ "${{ inputs.platform }}" == "all" ]; then
              echo 'platforms=["iOS", "macOS", "tvOS"]' >> $GITHUB_OUTPUT
            else
              echo 'platforms=["${{ inputs.platform }}"]' >> $GITHUB_OUTPUT
            fi
          else
            # Tag push - determine from tag name
            TAG="${GITHUB_REF#refs/tags/}"

            if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
              echo "environment=staging" >> $GITHUB_OUTPUT
            else
              echo "environment=production" >> $GITHUB_OUTPUT
            fi

            # Deploy all platforms on tag push
            echo 'platforms=["iOS", "macOS", "tvOS"]' >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy ${{ matrix.platform }} to ${{ needs.determine-environment.outputs.environment }}
    needs: determine-environment
    runs-on: macos-15
    environment: ${{ needs.determine-environment.outputs.environment }}
    strategy:
      matrix:
        platform: ${{ fromJson(needs.determine-environment.outputs.platforms) }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # Code Signing Setup
      # Required secrets:
      # - CERTIFICATE_BASE64: Base64-encoded Apple Distribution certificate (.p12)
      # - CERTIFICATE_PASSWORD: Password for the certificate
      # - PROVISIONING_PROFILE_IOS_BASE64: iOS provisioning profile
      # - PROVISIONING_PROFILE_MACOS_BASE64: macOS provisioning profile
      # - PROVISIONING_PROFILE_TVOS_BASE64: tvOS provisioning profile
      # - APP_STORE_CONNECT_API_KEY_ID: App Store Connect API Key ID
      # - APP_STORE_CONNECT_API_ISSUER_ID: App Store Connect API Issuer ID
      # - APP_STORE_CONNECT_API_KEY_BASE64: Base64-encoded App Store Connect API Key (.p8)

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_IOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_IOS_BASE64 }}
          PROVISIONING_PROFILE_MACOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_MACOS_BASE64 }}
          PROVISIONING_PROFILE_TVOS_BASE64: ${{ secrets.PROVISIONING_PROFILE_TVOS_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          # Install appropriate provisioning profile based on platform
          case "${{ matrix.platform }}" in
            iOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_IOS_BASE64"
              ;;
            macOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_MACOS_BASE64"
              ;;
            tvOS)
              PROFILE_BASE64="$PROVISIONING_PROFILE_TVOS_BASE64"
              ;;
          esac

          if [ -n "$PROFILE_BASE64" ]; then
            PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
            PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
            cp "$PROFILE_PATH" "$PP_DIR/$PP_UUID.mobileprovision"
          fi

      - name: Set platform destination
        id: destination
        run: |
          case "${{ matrix.platform }}" in
            iOS)
              echo "destination=generic/platform=iOS" >> $GITHUB_OUTPUT
              echo "sdk=iphoneos" >> $GITHUB_OUTPUT
              ;;
            macOS)
              echo "destination=platform=macOS" >> $GITHUB_OUTPUT
              echo "sdk=macosx" >> $GITHUB_OUTPUT
              ;;
            tvOS)
              echo "destination=generic/platform=tvOS" >> $GITHUB_OUTPUT
              echo "sdk=appletvos" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Archive ${{ matrix.platform }}
        run: |
          xcodebuild archive \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "${{ steps.destination.outputs.destination }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/EasyIpTv-${{ matrix.platform }}.xcarchive" \
            -sdk ${{ steps.destination.outputs.sdk }}

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>\$TEAM_ID</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EasyIpTv-${{ matrix.platform }}.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Setup App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8
          echo "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV

      - name: Upload to App Store Connect (iOS/tvOS)
        if: matrix.platform != 'macOS'
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/EasyIpTv.ipa" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload to App Store Connect (macOS)
        if: matrix.platform == 'macOS'
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          # For macOS, notarize first, then upload
          xcrun notarytool submit \
            "$RUNNER_TEMP/export/EasyIpTv.pkg" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun altool --upload-app \
            --type macos \
            --file "$RUNNER_TEMP/export/EasyIpTv.pkg" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$API_KEY_PATH" || true
