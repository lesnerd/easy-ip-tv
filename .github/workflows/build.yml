name: Build & Test

# Branch protection: require "Unit Tests", "Build iOS", "Build macOS", "Build tvOS"
# to pass before merging PRs into main (configure in GitHub repo Settings > Branches).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -only-testing:EasyIpTvTests \
            -skip-testing:EasyIpTvTests/ContentLoadingTests \
            -skip-testing:EasyIpTvTests/M3UIntegrationTests \
            -parallel-testing-enabled YES \
            -enableCodeCoverage NO \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  integration-tests:
    name: Integration Tests
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Run integration tests
        run: |
          xcodebuild test \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -only-testing:EasyIpTvTests/ContentLoadingTests \
            -only-testing:EasyIpTvTests/M3UIntegrationTests \
            -enableCodeCoverage NO \
            -resultBundlePath IntegrationTestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: IntegrationTestResults.xcresult

  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Build for macOS
        run: |
          xcodebuild build \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color || true

  build-ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color || true

  build-tvos:
    name: Build tvOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Build for tvOS Simulator
        run: |
          xcodebuild build \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "generic/platform=tvOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color || true
