name: Deploy to App Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -only-testing:EasyIpTvTests \
            -skip-testing:EasyIpTvTests/ContentLoadingTests \
            -skip-testing:EasyIpTvTests/M3UIntegrationTests \
            -parallel-testing-enabled YES \
            -enableCodeCoverage NO \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-test-results
          path: TestResults.xcresult

  deploy-ios:
    name: Deploy iOS
    needs: unit-tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: First launch setup
        run: xcodebuild -runFirstLaunch

      - name: Install iOS simulator runtime
        run: xcodebuild -downloadPlatform iOS || true

      - name: Determine build number
        id: build_number
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Set build number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = ${{ steps.build_number.outputs.build_number }}/" EasyIpTv.xcodeproj/project.pbxproj

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          echo "API_KEY_PATH=~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8" >> $GITHUB_ENV

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Import signing certificate
        run: |
          echo "${{ secrets.CERTIFICATE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "${{ secrets.PROVISIONING_PROFILE_IOS_BASE64 }}" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i $RUNNER_TEMP/profile.mobileprovision))
          cp $RUNNER_TEMP/profile.mobileprovision "$PP_DIR/$PP_UUID.mobileprovision"
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Archive iOS
        run: |
          xcodebuild archive \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/EasyIpTv.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>E8QKWT4ZU2</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.easycompany.EasyIpTv</key>
                  <string>$PP_UUID</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EasyIpTv.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/EasyIpTv.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

      - name: Clean up
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf ~/private_keys || true

  deploy-macos:
    name: Deploy macOS
    needs: unit-tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Determine build number
        id: build_number
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Set build number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = ${{ steps.build_number.outputs.build_number }}/" EasyIpTv.xcodeproj/project.pbxproj

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          echo "API_KEY_PATH=~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8" >> $GITHUB_ENV

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Import signing certificate
        run: |
          echo "${{ secrets.CERTIFICATE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          PP_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "${{ secrets.PROVISIONING_PROFILE_MACOS_BASE64 }}" | base64 --decode > $RUNNER_TEMP/profile.provisionprofile
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i $RUNNER_TEMP/profile.provisionprofile))
          cp $RUNNER_TEMP/profile.provisionprofile "$PP_DIR/$PP_UUID.provisionprofile"
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Archive macOS
        run: |
          xcodebuild archive \
            -project EasyIpTv.xcodeproj \
            -scheme EasyIpTv \
            -destination "generic/platform=macOS" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/EasyIpTv-macOS.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID"

      - name: Export macOS app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions-macOS.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>E8QKWT4ZU2</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.easycompany.EasyIpTv</key>
                  <string>$PP_UUID</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EasyIpTv-macOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-macos" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-macOS.plist"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type osx \
            --file "$RUNNER_TEMP/export-macos/EasyIpTv.pkg" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

      - name: Clean up
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf ~/private_keys || true
